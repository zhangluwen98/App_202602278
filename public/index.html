<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kira: Immersive Stories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 平滑过渡动画 */
        .message-container {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
        }
        
        .message-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 平滑过渡动画 */
        .message-container {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
        }
        
        .message-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 固定对话框最大宽度，避免布局跳动 */
        .message-bubble {
            min-height: 40px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        /* 对话内容更新时的平滑过渡 */
        .message-text {
            transition: all 0.3s ease;
        }
        
        /* 打字指示器容器，固定高度避免布局跳动 */
        .typing-indicator-container {
            height: 40px;
            display: flex;
            align-items: flex-end;
        }
        
        /* 平滑滚动 */
        .scroll-smooth {
            scroll-behavior: smooth;
        }
        
        /* 章节结束弹窗过渡效果 */
        .chapter-end-section {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
        }
        
        .chapter-end-section.hidden {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            height: 0;
            overflow: hidden;
        }
        
        /* 骨架屏效果 */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }
        
        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }
        </style>
</head>
<body class="bg-gray-50 h-screen w-full flex flex-col overflow-hidden text-gray-900" x-data="app()">
    
    <!-- View: Home (Novel List) -->
    <template x-if="view === 'home'">
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <h1 class="text-3xl font-black mb-6 mt-4">Kira Stories</h1>
            <template x-for="novel in novels" :key="novel.id">
                <div @click="loadNovel(novel.id)" class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex gap-4 active:scale-95 transition-transform cursor-pointer">
                    <img :src="novel.cover" class="w-20 h-28 object-cover rounded-xl shadow-sm bg-gray-200">
                    <div class="flex-1 flex flex-col justify-center">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-lg" x-text="novel.title"></h3>
                            <span :class="novel.status === 'Completed' ? 'text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded-full' : 'text-[10px] bg-amber-100 text-amber-600 px-2 py-1 rounded-full'" x-text="novel.status === 'Completed' ? '已完结' : '未完结'"></span>
                        </div>
                        <p class="text-xs text-gray-500 mb-1" x-text="'作者: ' + novel.author"></p>
                        <p class="text-xs text-gray-500 line-clamp-2 mb-2" x-text="novel.description"></p>
                        <div class="flex gap-2 mb-2">
                            <template x-for="tag in novel.tags">
                                <span class="text-[10px] bg-gray-100 px-2 py-1 rounded-full text-gray-600" x-text="tag"></span>
                            </template>
                        </div>
                        <div class="flex items-center gap-2 text-xs text-gray-500">
                            <span class="flex items-center gap-1">
                                <i data-lucide="heart" class="w-3 h-3 text-red-400"></i>
                                <span x-text="novel.likes || 0"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="novels.length === 0" class="text-center text-gray-400 mt-20">Loading library...</div>
        </div>
    </template>

    <!-- View: Reader -->
    <template x-if="view === 'reader'">
        <div class="flex-1 flex flex-col h-full bg-[#f2f2f2]">
            <!-- Header -->
            <header class="bg-white/90 backdrop-blur border-b border-gray-200 p-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
                <button @click="goHome" class="p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-full">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>
                <div class="text-center">
                    <h2 class="font-bold text-sm" x-text="currentNovel?.title"></h2>
                    <p class="text-[10px] text-gray-500" x-text="currentChapter?.title || 'Loading...'"></p>
                </div>
                <button @click="showChapterMenu = !showChapterMenu" class="p-2 -mr-2 text-gray-500 hover:bg-gray-100 rounded-full">
                    <i data-lucide="list" class="w-5 h-5"></i>
                </button>
            </header>
            
            <!-- Chapter Selection Menu -->
            <div x-show="showChapterMenu" class="fixed inset-0 bg-black/50 z-20 flex items-center justify-center" @click="showChapterMenu = false">
                <div @click.stop class="bg-white rounded-2xl p-4 w-[80%] max-w-sm max-h-[80vh] overflow-y-auto">
                    <h3 class="font-bold text-lg mb-4 text-center">选择章节</h3>
                    <div class="space-y-2">
                        <template x-for="(chapter, index) in currentNovel?.chapters" :key="chapter.id">
                            <button @click="() => {
                                showChapterMenu = false;
                                startChapter(index);
                                // Update URL to include chapter anchor for sharing
                                const url = new URL(window.location.href);
                                url.searchParams.set('novel', currentNovel.id);
                                if (index > 0) {
                                    url.hash = `chapter-${index + 1}`;
                                }
                                window.history.pushState({}, '', url);
                            }" :class="currentChapter?.id === chapter.id ? 'bg-blue-100 text-blue-600' : 'bg-gray-50'" class="w-full text-left px-4 py-3 rounded-xl font-medium">
                                <span x-text="'第' + (index + 1) + '章：' + chapter.title"></span>
                            </button>
                        </template>
                    </div>
                    <button @click="showChapterMenu = false" class="mt-4 w-full bg-gray-100 text-gray-600 py-3 rounded-xl font-medium">
                        关闭
                    </button>
                </div>
            </div>

            <!-- Chat Container -->
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar scroll-smooth">
                <template x-for="msg in messages" :key="msg.id">
                    <div class="message-container visible" :data-message-id="msg.id">
                        <!-- Narration -->
                        <template x-if="msg.type === 'narration'">
                            <div class="flex justify-center my-4">
                                <div class="bg-gray-200/50 text-gray-500 text-xs px-4 py-1 rounded-full message-bubble" x-text="msg.text"></div>
                            </div>
                        </template>
                        
                        <!-- Dialogue -->
                        <template x-if="msg.type === 'dialogue'">
                            <div :class="msg.isUser ? 'flex flex-row-reverse items-end gap-2' : 'flex items-end gap-2'">
                                <template x-if="!msg.isUser">
                                    <img :src="getAvatar(msg.speaker)" class="w-8 h-8 rounded-full bg-gray-300 object-cover shadow-sm mb-1 transition-opacity duration-300">
                                </template>
                                
                                <div class="flex flex-col gap-1 max-w-[75%]">
                                    <template x-if="!msg.isUser">
                                        <span class="text-[10px] text-gray-400 ml-1 transition-opacity duration-300" x-text="msg.speaker"></span>
                                    </template>
                                    <div :class="msg.isUser ? 'bg-blue-500 text-white rounded-2xl rounded-br-none px-4 py-2 shadow-md' : 'bg-white text-gray-800 rounded-2xl rounded-bl-none px-4 py-2 shadow-sm border border-gray-100'" 
                                         class="text-sm leading-relaxed message-bubble">
                                        <span class="message-text" x-text="msg.text"></span>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
                
                <!-- Typing Indicator -->
                <div x-show="isTyping" class="typing-indicator-container flex items-end gap-2 ml-1" x-transition>
                     <img :src="getAvatar(currentSpeaker)" class="w-8 h-8 rounded-full bg-gray-300 object-cover shadow-sm mb-1">
                     <div class="flex flex-col gap-1 max-w-[75%]">
                         <span class="text-[10px] text-gray-400 ml-1" x-text="currentSpeaker"></span>
                         <div class="bg-white text-gray-800 rounded-2xl rounded-bl-none px-4 py-2 shadow-sm border border-gray-100 text-sm">...</div>
                     </div>
                </div>

                <!-- Choices -->
                <div x-show="currentChoices.length > 0 && !isTyping" class="choices-container visible flex flex-col gap-2 mt-4 px-4 pb-8">
                    <template x-for="choice in currentChoices" :key="choice.id">
                        <button @click="handleChoice(choice)" class="w-full bg-white border border-blue-100 text-blue-600 font-medium py-3 rounded-xl shadow-sm active:scale-95 transition-all duration-200 hover:bg-blue-50">
                            <span x-text="choice.text"></span>
                        </button>
                    </template>
                </div>
                
                <!-- Chapter End - Character Hearts and Like Section -->
                <div x-show="showChapterEnd && !isTyping" class="chapter-end-section flex flex-col gap-4 mt-8 px-4 pb-8">
                    <div class="text-center mb-4">
                        <h3 class="font-bold text-lg mb-2">本章结束</h3>
                        <p class="text-sm text-gray-500">喜欢这个故事吗？为角色送上爱心吧！</p>
                    </div>
                    
                    <!-- Character Hearts -->
                    <div class="grid grid-cols-2 gap-3">
                        <template x-for="character in currentNovel?.characters" :key="character.id">
                            <div @click="giveHeart(character)" :class="likedCharacters.includes(character.id) ? 'bg-red-50 border-red-200 cursor-default' : 'bg-white border-gray-100 hover:bg-red-50 cursor-pointer'" class="p-3 rounded-xl shadow-sm border flex items-center gap-3 active:scale-95 transition-all duration-200">
                                <img :src="character.avatar" class="w-10 h-10 rounded-full object-cover">
                                <div class="flex-1">
                                    <div class="flex justify-between items-center">
                                        <span class="font-medium text-sm" x-text="character.name"></span>
                                        <span class="text-xs text-gray-500 flex items-center gap-1">
                                            <template x-if="likedCharacters.includes(character.id)">
                                                <span class="text-red-500">❤</span>
                                            </template>
                                            <template x-else>
                                                <span class="text-red-400">♡</span>
                                            </template>
                                            <span x-text="character.hearts || 0"></span>
                                        </span>
                                    </div>
                                    <p class="text-xs text-gray-500" x-text="character.role"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                    
                    <!-- Story Like Button -->
                    <button @click="likeStory()" :class="storyLiked ? 'bg-red-600 cursor-default' : 'bg-red-500 hover:bg-red-600 cursor-pointer'" class="w-full text-white font-medium py-3 rounded-xl shadow-md active:scale-95 transition-all duration-200 flex items-center justify-center gap-2">
                        <template x-if="storyLiked">
                            <span>❤</span>
                        </template>
                        <template x-else>
                            <span>♡</span>
                        </template>
                        <span x-text="storyLiked ? '已点赞' : '为故事点赞'"></span>
                        <span x-text="currentNovel?.likes || 0"></span>
                    </button>
                    
                    <!-- Go to Other Stories Button -->
                    <button @click="goToOtherStories()" class="w-full bg-gray-100 text-gray-600 font-medium py-3 rounded-xl shadow-sm active:scale-95 transition-all duration-200 hover:bg-gray-200 flex items-center justify-center gap-2">
                        <i data-lucide="book-open" class="w-4 h-4"></i>
                        <span>看看其他故事</span>
                    </button>
                </div>
                 <!-- Spacer for scroll -->
                 <div class="h-4"></div>
            </div>

            <!-- Input Area (Pseudo) -->
            <div class="bg-white border-t border-gray-100 p-3 pb-safe">
                <div class="bg-gray-100 rounded-full px-4 py-3 text-gray-400 text-sm flex items-center gap-2 cursor-not-allowed opacity-60">
                    <i data-lucide="message-square" class="w-4 h-4"></i>
                    <span x-text="currentChoices.length > 0 ? 'Choose an option to continue...' : 'Waiting for response...'"></span>
                </div>
            </div>
        </div>
    </template>

    <script>
        document.addEventListener('alpine:init', () => {
            // 全局配置
            const CONFIG = {
                domain: 'https://app.kiragb.com/'
            };
            
            Alpine.data('app', () => ({
                view: 'home',
                novels: [],
                currentNovel: null,
                currentChapter: null,
                messages: [],
                isTyping: false,
                currentChoices: [],
                paragraphQueue: [],
                currentSpeaker: '',
                showChapterMenu: false,
                showChapterEnd: false,
                likedCharacters: [],
                storyLiked: false,
                
                async init() {
                    try {
                        const res = await fetch('novels_list.json');
                        if (!res.ok) throw new Error('Failed to load library');
                        this.novels = await res.json();
                        lucide.createIcons();
                        
                        // Check URL for novel parameter and chapter hash
                        const urlParams = new URLSearchParams(window.location.search);
                        const novelId = urlParams.get('novel');
                        const hash = window.location.hash;
                        let chapterIndex = 0;
                        
                        // Parse chapter index from hash (e.g., #chapter-2 -> 1)
                        if (hash && hash.startsWith('#chapter-')) {
                            const chapterNum = parseInt(hash.replace('#chapter-', ''));
                            if (!isNaN(chapterNum) && chapterNum > 0) {
                                chapterIndex = chapterNum - 1;
                            }
                        }
                        
                        if (novelId) {
                            // Load novel directly if ID is provided in URL
                            await this.loadNovel(novelId, chapterIndex);
                        }
                    } catch (e) {
                        console.error(e);
                        alert('Failed to initialize app. Check console.');
                    }
                },

                async loadNovel(id, chapterIndex = 0) {
                    try {
                        const res = await fetch(`novels/${id}.json`);
                        if (!res.ok) throw new Error('Failed to load novel');
                        this.currentNovel = await res.json();
                        this.startChapter(chapterIndex);
                        this.view = 'reader';
                        
                        // Update URL to include novel parameter and chapter anchor for sharing
                        const url = new URL(window.location.href);
                        url.searchParams.set('novel', id);
                        if (chapterIndex > 0) {
                            url.hash = `chapter-${chapterIndex + 1}`;
                        }
                        window.history.pushState({}, '', url);
                        
                        this.$nextTick(() => lucide.createIcons());
                    } catch (e) {
                        console.error(e);
                        alert('Error loading novel data.');
                    }
                },

                startChapter(index) {
                    const chapter = this.currentNovel.chapters[index];
                    if (!chapter) return;
                    this.currentChapter = chapter;
                    this.messages = [];
                    // Flatten logic: assuming linear flow for simplicity in demo
                    // Start with first paragraph
                    const firstPara = chapter.paragraphs[0];
                    if (firstPara) this.processParagraph(firstPara);
                },

                processParagraph(para) {
                    this.paragraphQueue = [...(para.parts || [])];
                    if (para.choices) {
                        this.pendingChoices = para.choices;
                    } else {
                        this.pendingChoices = [];
                    }
                    this.processQueue();
                },

                processQueue() {
                    if (this.paragraphQueue.length === 0) {
                        // End of paragraph parts, show choices if any
                        if (this.pendingChoices.length > 0) {
                            this.currentChoices = this.pendingChoices;
                            this.showChapterEnd = false;
                            // Trigger choices container animation
                            this.$nextTick(() => {
                                const choicesContainer = document.querySelector('.choices-container');
                                if (choicesContainer) {
                                    choicesContainer.classList.remove('visible');
                                    void choicesContainer.offsetWidth; // Trigger reflow
                                    choicesContainer.classList.add('visible');
                                }
                                this.scrollToBottom();
                            });
                        } else {
                            // No more choices, show chapter end section
                            this.showChapterEnd = true;
                            this.$nextTick(() => {
                                this.scrollToBottom();
                            });
                        }
                        return;
                    }

                    const part = this.paragraphQueue.shift();
                    
                    // Only show typing indicator for dialogue, not for narration
                    if (part.type === 'dialogue') {
                        this.currentSpeaker = part.speaker;
                        this.isTyping = true;
                        this.scrollToBottom();
                    }

                    // Simulate typing delay based on text length
                    const delay = part.type === 'narration' ? 300 : Math.min(1500, Math.max(800, part.text.length * 30));
                    
                    setTimeout(() => {
                        this.isTyping = false;
                        
                        // Add new message
                        const newMessage = {
                            id: Date.now(),
                            type: part.type,
                            text: part.text,
                            speaker: part.speaker,
                            isUser: false // Narrative/NPC is never user for now
                        };
                        
                        // Add message to array
                        this.messages.push(newMessage);
                        
                        // Scroll to bottom without animation to avoid layout issues
                        this.$nextTick(() => {
                            const container = document.getElementById('chat-container');
                            if (container) {
                                container.scrollTop = container.scrollHeight;
                            }
                        });
                        
                        // Next part
                        setTimeout(() => this.processQueue(), 500);
                    }, delay);
                },

                handleChoice(choice) {
                    // Hide choices with animation
                    const choicesContainer = document.querySelector('.choices-container');
                    if (choicesContainer) {
                        choicesContainer.classList.remove('visible');
                    }
                    
                    // Reset chapter end flag
                    this.showChapterEnd = false;
                    
                    // Add user message
                    const userMessage = {
                        id: Date.now(),
                        type: 'dialogue',
                        text: choice.text,
                        isUser: true
                    };
                    this.messages.push(userMessage);
                    
                    // Scroll to bottom without animation to avoid layout issues
                    this.$nextTick(() => {
                        const container = document.getElementById('chat-container');
                        if (container) {
                            container.scrollTop = container.scrollHeight;
                        }
                    });

                    // Check if choice has redirect action
                    if (choice.action === 'redirect' && choice.url) {
                        setTimeout(() => {
                            window.location.href = choice.url;
                        }, 1000);
                        return;
                    }

                    // Check if choice has like action
                    if (choice.action === 'like') {
                        this.likeStory();
                        this.currentChoices = [];
                        // Show chapter end section after liking
                        this.showChapterEnd = true;
                        this.$nextTick(() => {
                            this.scrollToBottom();
                        });
                        return;
                    }

                    // Find next paragraph
                    // For simplicity, take first nextParagraph
                    const nextId = choice.nextParagraphs[0];
                    const nextPara = this.findParagraph(nextId);
                    
                    if (nextPara) {
                        setTimeout(() => {
                            this.currentChoices = [];
                            this.processParagraph(nextPara);
                        }, 800);
                    } else {
                        console.warn('Next paragraph not found:', nextId);
                        this.currentChoices = [];
                        // No more paragraphs, show chapter end section
                        this.showChapterEnd = true;
                        this.$nextTick(() => {
                            this.scrollToBottom();
                        });
                    }
                },
                
                giveHeart(character) {
                    // Check if character has already been liked
                    if (this.likedCharacters.includes(character.id)) {
                        return;
                    }
                    
                    // Increment heart count
                    character.hearts = (character.hearts || 0) + 1;
                    
                    // Add character to liked list
                    this.likedCharacters.push(character.id);
                    
                    // Add heart animation or feedback here if needed
                    
                    // Save to backend (simulated for now)
                    try {
                        // In a real app, this would be an API call
                        console.log(`Gave heart to ${character.name}, total: ${character.hearts}`);
                        // Update local JSON file (simulated)
                        // In a real app, you would send this to a server
                    } catch (error) {
                        console.error('Error giving heart:', error);
                    }
                },
                
                likeStory() {
                    // Check if story has already been liked
                    if (this.storyLiked) {
                        return;
                    }
                    
                    // Increment like count
                    this.currentNovel.likes = (this.currentNovel.likes || 0) + 1;
                    
                    // Mark story as liked
                    this.storyLiked = true;
                    
                    // Add like animation or feedback here if needed
                    
                    // Save to backend (simulated for now)
                    try {
                        // In a real app, this would be an API call
                        console.log(`Liked story, total: ${this.currentNovel.likes}`);
                        // Update local JSON file (simulated)
                        // In a real app, you would send this to a server
                    } catch (error) {
                        console.error('Error liking story:', error);
                    }
                },
                
                goToOtherStories() {
                    this.goHome();
                },

                findParagraph(id) {
                    if (!this.currentChapter) return null;
                    const all = [...(this.currentChapter.paragraphs || []), ...(this.currentChapter.extendedParagraphs || [])];
                    return all.find(p => p.id === id);
                },

                getAvatar(name) {
                    const char = this.currentNovel?.characters.find(c => c.name === name);
                    return char?.avatar || `https://api.dicebear.com/7.x/initials/svg?seed=${name}`;
                },
                
                scrollToBottom() {
                    this.$nextTick(() => {
                        const container = document.getElementById('chat-container');
                        if (container) container.scrollTop = container.scrollHeight;
                    });
                },
                
                goHome() {
                    this.view = 'home';
                    this.currentNovel = null;
                    this.currentChapter = null;
                    this.messages = [];
                    this.currentChoices = [];
                    this.paragraphQueue = [];
                    this.isTyping = false;
                    
                    // Clear novel parameter from URL
                    const url = new URL(window.location.href);
                    url.searchParams.delete('novel');
                    window.history.pushState({}, '', url);
                }
            }))
        });
    </script>
</body>
</html>
